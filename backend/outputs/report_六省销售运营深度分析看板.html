<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>六省销售运营深度分析看板</title><script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}body{background:radial-gradient(circle at center,#081d33,#041020);color:#e0e0e0;min-height:100vh;padding:20px}.dashboard{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:minmax(100px,auto);gap:20px;max-width:1600px;margin:0 auto}.kpi-section{grid-column:span 12;height:24vh;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}.kpi-card{padding:20px;border-radius:12px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.1)}.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--color1),var(--color2));opacity:0.15;z-index:-1}.kpi-value{font-size:2.8rem;font-weight:700;margin:10px 0 5px}.kpi-label{font-size:1rem;color:#aaa}.chart-main{grid-column:span 8;height:38vh;background:rgba(255,255,255,0.03);border-radius:12px;padding:20px}.chart-pie{grid-column:span 4;height:38vh;background:rgba(255,255,255,0.03);border-radius:12px;padding:20px}.chart-bar{grid-column:span 12;height:38vh;background:rgba(255,255,255,0.03);border-radius:12px;padding:20px}.chart-title{font-size:1.2rem;margin-bottom:15px;color:#fff;font-weight:600}.chart-container{width:100%;height:calc(100% - 40px)}@media (max-width:1000px){.chart-main,.chart-pie,.chart-bar{grid-column:span 12}}</style></head><body><div class="dashboard"><div class="kpi-section"><div class="kpi-card" style="--color1:#3a86ff;--color2:#00b4d8"><div class="kpi-label">总销售额</div><div class="kpi-value">1930万元</div></div><div class="kpi-card" style="--color1:#00b4d8;--color2:#7209b7"><div class="kpi-label">总活跃客户数</div><div class="kpi-value">31万</div></div><div class="kpi-card" style="--color1:#7209b7;--color2:#f3722c"><div class="kpi-label">总门店数</div><div class="kpi-value">435</div></div><div class="kpi-card" style="--color1:#f3722c;--color2:#f72585"><div class="kpi-label">平均人均销售额</div><div class="kpi-value">72.26元</div></div><div class="kpi-card" style="--color1:#f72585;--color2:#3a86ff"><div class="kpi-label">平均单店客户数</div><div class="kpi-value">640.53</div></div></div><div class="chart-main"><div class="chart-title">销售额与活跃客户数趋势分析</div><div class="chart-container" id="mainChart"></div></div><div class="chart-pie"><div class="chart-title">销售额省份构成</div><div class="chart-container" id="pieChart"></div></div><div class="chart-bar"><div class="chart-title">人均销售额Top 5省份</div><div class="chart-container" id="barChart"></div></div></div><script>const data={provinces:['广东','上海','北京','浙江','四川','湖北'],activeCustomers:[85000,62000,58000,45000,32000,28000],sales:[5000000,3800000,3500000,4200000,2800000,0],stores:[120,80,75,95,65,0],salesPerCapita:[58.82,61.29,60.34,93.33,87.5,0],customersPerStore:[708.33,775,773.33,473.68,492.31,0],regions:['华南','华东','华北',null,'西南','中部']};function formatNumber(num){if(num>=1e8)return(num/1e8).toFixed(2)+'亿元';if(num>=1e4)return(num/1e4).toFixed(2)+'万元';return num.toFixed(2)+'元'}const totalSales=data.sales.reduce((a,b)=>a+b,0);const totalCustomers=data.activeCustomers.reduce((a,b)=>a+b,0);const totalStores=data.stores.reduce((a,b)=>a+b,0);const avgSalesPerCapita=data.salesPerCapita.filter(v=>v>0).reduce((a,b)=>a+b,0)/data.salesPerCapita.filter(v=>v>0).length;const avgCustomersPerStore=data.customersPerStore.filter(v=>v>0).reduce((a,b)=>a+b,0)/data.customersPerStore.filter(v=>v>0).length;document.querySelectorAll('.kpi-value')[0].textContent=formatNumber(totalSales);document.querySelectorAll('.kpi-value')[1].textContent=formatNumber(totalCustomers);document.querySelectorAll('.kpi-value')[2].textContent=totalStores+'家';document.querySelectorAll('.kpi-value')[3].textContent=avgSalesPerCapita.toFixed(2)+'元';document.querySelectorAll('.kpi-value')[4].textContent=avgCustomersPerStore.toFixed(2);const mainChart=echarts.init(document.getElementById('mainChart'));mainChart.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',axisPointer:{type:'cross'}},legend:{data:['销售额','活跃客户数'],textStyle:{color:'#ccc'}},grid:{left:'3%',right:'4%',bottom:'3%',containLabel:true},xAxis:[{type:'category',data:data.provinces,axisLine:{lineStyle:{color:'#666'}},axisLabel:{color:'#ccc'}}],yAxis:[{type:'value',name:'销售额',position:'left',axisLine:{show:true,lineStyle:{color:'#3a86ff'}},axisLabel:{formatter:function(value){return formatNumber(value)},color:'#ccc'}},{type:'value',name:'活跃客户数',position:'right',axisLine:{show:true,lineStyle:{color:'#00b4d8'}},axisLabel:{formatter:function(value){return(value/10000).toFixed(1)+'万'},color:'#ccc'}}],series:[{name:'销售额',type:'bar',yAxisIndex:0,data:data.sales,itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#3a86ff'},{offset:1,color:'#00b4d8'}])}},{name:'活跃客户数',type:'line',yAxisIndex:1,data:data.activeCustomers,symbol:'circle',symbolSize:8,lineStyle:{color:'#00b4d8',width:3},itemStyle:{color:'#00b4d8'}}]});const pieData=data.sales.map((sales,index)=>({name:data.provinces[index],value:sales})).filter(item=>item.value>0);if(pieData.length>10){const otherSum=pieData.slice(9).reduce((sum,item)=>sum+item.value,0);pieData.splice(9,pieData.length-9,{name:'其他',value:otherSum})}const pieChart=echarts.init(document.getElementById('pieChart'));pieChart.setOption({backgroundColor:'transparent',tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},legend:{orient:'vertical',right:10,top:'center',textStyle:{color:'#ccc'}},series:[{type:'pie',radius:['40%','70%'],avoidLabelOverlap:false,itemStyle:{borderRadius:10,borderColor:'#041020',borderWidth:2},label:{show:false},emphasis:{label:{show:true,fontSize:'16',fontWeight:'bold'}},data:pieData,color:['#3a86ff','#00b4d8','#7209b7','#f3722c','#f72585']}]});const barData=data.salesPerCapita.map((value,index)=>({name:data.provinces[index],value:value})).filter(item=>item.value>0).sort((a,b)=>b.value-a.value).slice(0,5);const barChart=echarts.init(document.getElementById('barChart'));barChart.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:'{b}: {c}元'},grid:{left:'3%',right:'8%',bottom:'3%',containLabel:true},xAxis:{type:'value',axisLine:{lineStyle:{color:'#666'}},axisLabel:{color:'#ccc',formatter:function(value){return value+'元'}}},yAxis:{type:'category',data:barData.map(item=>item.name),axisLine:{lineStyle:{color:'#666'}},axisLabel:{color:'#ccc'}},series:[{type:'bar',data:barData.map(item=>item.value),label:{show:true,position:'right',formatter:'{c}元',color:'#fff'},itemStyle:{color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#7209b7'},{offset:1,color:'#f72585'}])}}]});window.addEventListener('resize',()=>{mainChart.resize();pieChart.resize();barChart.resize()});</script></body></html>
