<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>地区业务运营深度分析看板</title><script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}body{background:radial-gradient(circle at center,#081d33,#041020);color:#e0e0e0;min-height:100vh;padding:20px}.dashboard{display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:auto auto auto;gap:20px;max-width:1600px;margin:0 auto}.title{grid-column:1/-1;text-align:center;margin-bottom:20px;padding:15px;background:linear-gradient(90deg,#1a237e,#0d47a1);border-radius:12px;border:1px solid #64b5f6;box-shadow:0 0 15px rgba(33,150,243,0.5)}.title h1{font-size:2.2rem;background:linear-gradient(90deg,#4fc3f7,#e91e63);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}.title p{font-size:1rem;opacity:0.9}.kpi-container{grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:20px;height:24%}.kpi-card{padding:20px;border-radius:12px;border:1px solid;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;transition:transform 0.3s,box-shadow 0.3s}.kpi-card:hover{transform:translateY(-5px)}.kpi-value{font-size:2.8rem;font-weight:700;margin:10px 0 5px}.kpi-label{font-size:1rem;opacity:0.9}.kpi-unit{font-size:0.9rem;opacity:0.7;margin-left:4px}.chart-main{grid-column:span 8;background:rgba(20,30,48,0.7);border-radius:12px;padding:20px;border:1px solid #37474f}.chart-side{grid-column:span 4;background:rgba(20,30,48,0.7);border-radius:12px;padding:20px;border:1px solid #37474f}.chart-container{width:100%;height:400px}@media (max-width:1000px){.dashboard{grid-template-columns:1fr;gap:15px}.chart-main,.chart-side{grid-column:1/-1}.kpi-container{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}}</style></head><body><div class="dashboard"><div class="title"><h1>地区业务运营深度分析看板</h1><p>基于最新业务数据的多维度可视化分析</p></div><div class="kpi-container"><div class="kpi-card" style="background:linear-gradient(135deg,#0d47a1,#1a237e);border-color:#2979ff"><div class="kpi-label">活跃用户总数</div><div class="kpi-value">13.0<span class="kpi-unit">万</span></div><div class="kpi-label">广东+浙江</div></div><div class="kpi-card" style="background:linear-gradient(135deg,#00695c,#004d40);border-color:#00bfa5"><div class="kpi-label">门店总数</div><div class="kpi-value">120<span class="kpi-unit">家</span></div><div class="kpi-label">广东</div></div><div class="kpi-card" style="background:linear-gradient(135deg,#4a148c,#311b92);border-color:#7c4dff"><div class="kpi-label">最高人均销售额</div><div class="kpi-value">93.33<span class="kpi-unit">元</span></div><div class="kpi-label">浙江</div></div><div class="kpi-card" style="background:linear-gradient(135deg,#e65100,#bf360c);border-color:#ff9800"><div class="kpi-label">总销售额</div><div class="kpi-value">420<span class="kpi-unit">万元</span></div><div class="kpi-label">浙江</div></div><div class="kpi-card" style="background:linear-gradient(135deg,#ad1457,#880e4f);border-color:#f50057"><div class="kpi-label">单店客户数</div><div class="kpi-value">>770<span class="kpi-unit">人</span></div><div class="kpi-label">上海/北京</div></div></div><div class="chart-main"><h3>地区核心指标对比</h3><div id="mainChart" class="chart-container"></div></div><div class="chart-side"><h3>人均销售额构成</h3><div id="pieChart" class="chart-container"></div></div></div><script>const data={regions:['广东','浙江','四川'],activeUsers:[8.5,4.5,null],stores:[120,null,null],avgSales:[58.82,93.33,87.5],totalSales:[null,420,null],storeCustomers:[null,null,null]};function formatValue(val,type){if(val===null||val===undefined)return'—';if(type==='totalSales'&&val>=100)return(val/100).toFixed(1)+'亿元';if(type==='totalSales'&&val>=1)return val.toFixed(1)+'万元';if(type==='activeUsers')return val.toFixed(1)+'万';if(type==='avgSales')return val.toFixed(2)+'元';if(type==='stores')return val+'家';return val;}const mainChart=echarts.init(document.getElementById('mainChart'));const mainOption={backgroundColor:'transparent',tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},legend:{top:10,textStyle:{color:'#ccc'}},grid:{left:'3%',right:'4%',bottom:'3%',containLabel:true},xAxis:[{type:'category',data:data.regions,axisLine:{lineStyle:{color:'#78909c'}},axisLabel:{color:'#b0bec5'}}],yAxis:[{type:'value',name:'活跃用户数(万)/门店数(家)',position:'left',axisLine:{show:true,lineStyle:{color:'#4fc3f7'}},axisLabel:{color:'#b0bec5'}},{type:'value',name:'人均销售额(元)',position:'right',axisLine:{show:true,lineStyle:{color:'#e91e63'}},axisLabel:{color:'#b0bec5'}}],series:[{name:'活跃用户数',type:'bar',yAxisIndex:0,data:data.activeUsers.map(v=>v||0),itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#2979ff'},{offset:1,color:'#00bcd4'}])}},{name:'门店数',type:'bar',yAxisIndex:0,data:data.stores.map(v=>v||0),itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#00bfa5'},{offset:1,color:'#64dd17'}])}},{name:'人均销售额',type:'line',yAxisIndex:1,smooth:true,symbol:'circle',symbolSize:8,lineStyle:{width:3,color:'#e91e63'},itemStyle:{color:'#ff4081'},data:data.avgSales.map(v=>v||null)}]};mainChart.setOption(mainOption);const pieChart=echarts.init(document.getElementById('pieChart'));const pieData=data.regions.map((region,idx)=>({name:region,value:data.avgSales[idx]||0})).filter(item=>item.value>0);const pieOption={backgroundColor:'transparent',tooltip:{trigger:'item',formatter:'{b}: {c}元 ({d}%)'},legend:{top:20,textStyle:{color:'#ccc'}},series:[{type:'pie',radius:['40%','70%'],avoidLabelOverlap:false,itemStyle:{borderRadius:8,borderColor:'#041020',borderWidth:2},label:{color:'#e0e0e0'},emphasis:{label:{show:true,fontSize:16,fontWeight:'bold'}},labelLine:{lineStyle:{color:'#78909c'}},data:pieData}]};pieChart.setOption(pieOption);window.addEventListener('resize',()=>{mainChart.resize();pieChart.resize();});</script></body></html>
