<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dynamic Background with Gradients -->
  <rect width="1200" height="800" rx="24" fill="#FAFAFA"/>
  <circle cx="200" cy="150" r="300" fill="#BFFFD9" fill-opacity="0.2" filter="blur(80px)"/>
  <circle cx="1000" cy="650" r="300" fill="#E0FFFF" fill-opacity="0.15" filter="blur(80px)"/>

  <!-- Device: iPhone 15 Pro Portrait Style -->
  <g transform="translate(150, 60)">
    <!-- Device Frame -->
    <rect x="0" y="0" width="360" height="680" rx="55" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <rect x="6" y="6" width="348" height="668" rx="50" fill="black"/>
    
    <!-- Camera/Dynamic Island -->
    <rect x="110" y="24" width="140" height="30" rx="15" fill="#0F172A"/>
    
    <!-- Screen -->
    <rect x="14" y="14" width="332" height="652" rx="42" fill="#FFFFFF"/>
    
    <!-- App UI: Session List (Default Tab) -->
    <g transform="translate(14, 14)">
      <!-- Animated Background Blobs -->
      <path d="M0 0 H332 V200 C332 200 250 250 166 200 C82 150 0 200 0 200 Z" fill="url(#mobile-grad)" fill-opacity="0.2"/>
      
      <!-- Nav Tabs -->
      <g transform="translate(20, 64)">
        <rect width="292" height="44" rx="12" fill="white" fill-opacity="0.6" stroke="white" stroke-opacity="0.8"/>
        <text x="48" y="92" fill="#BFFFD9" font-family="Inter, sans-serif" font-weight="700" font-size="13" text-anchor="middle">会话</text>
        <line x1="28" y1="102" x2="68" y2="102" stroke="#BFFFD9" stroke-width="2" stroke-linecap="round"/>
        
        <text x="146" y="92" fill="#94A3B8" font-family="Inter, sans-serif" font-weight="500" font-size="13" text-anchor="middle">对话</text>
        <text x="244" y="92" fill="#94A3B8" font-family="Inter, sans-serif" font-weight="500" font-size="13" text-anchor="middle">图表</text>
      </g>
      
      <!-- Session List Content -->
      <g transform="translate(20, 130)">
        <text x="0" y="20" fill="#334155" font-family="Inter, sans-serif" font-weight="700" font-size="18">历史分析</text>
        <text x="292" y="18" fill="#3B82F6" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="end">+ 新建</text>
        
        <!-- Search -->
        <rect x="0" y="40" width="292" height="36" rx="12" fill="#F1F5F9" stroke="#E2E8F0"/>
        <text x="12" y="63" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">搜索会话记录...</text>
        
        <!-- Items -->
        <g transform="translate(0, 96)">
          <rect width="292" height="68" rx="18" fill="#BFFFD9" fill-opacity="0.3" stroke="#BFFFD9" stroke-opacity="0.5"/>
          <text x="16" y="32" fill="#1E293B" font-family="Inter, sans-serif" font-weight="600" font-size="14">🧠 季度模型预测</text>
          <text x="16" y="52" fill="#64748B" font-family="Inter, sans-serif" font-size="11">刚刚 · 已同步</text>
          
          <g transform="translate(0, 84)">
            <rect width="292" height="68" rx="18" fill="white" stroke="#F1F5F9"/>
            <text x="16" y="32" fill="#475569" font-family="Inter, sans-serif" font-weight="500" font-size="14">📊 销售分布分析</text>
            <text x="16" y="52" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">2 小时前</text>
          </g>
        </g>
      </g>

      <!-- Bottom Profile/Sync -->
      <g transform="translate(0, 580)">
        <rect width="332" height="72" fill="white" fill-opacity="0.8"/>
        <line x1="0" y1="0" x2="332" y2="0" stroke="#F1F5F9"/>
        <circle cx="44" cy="36" r="16" fill="url(#brand-grad)"/>
        <text x="44" y="41" fill="white" font-family="Inter, sans-serif" font-weight="700" font-size="12" text-anchor="middle">H</text>
        <text x="68" y="35" fill="#334155" font-family="Inter, sans-serif" font-weight="600" font-size="13">Huyitao</text>
        <rect x="230" y="24" width="80" height="24" rx="8" fill="#F0FDF4" stroke="#BBF7D0"/>
        <text x="270" y="40" fill="#166534" font-family="Inter, sans-serif" font-weight="700" font-size="9" text-anchor="middle">✅ SSE 实时连接</text>
      </g>
      
      <!-- Home Indicator -->
      <rect x="116" y="640" width="100" height="4" rx="2" fill="#E2E8F0"/>
    </g>
  </g>

  <!-- Device: Landcape Mode Preview -->
  <g transform="translate(680, 150)">
    <!-- Device Frame -->
    <rect x="0" y="0" width="450" height="280" rx="40" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <rect x="6" y="6" width="438" height="268" rx="35" fill="black"/>
    
    <!-- Screen -->
    <rect x="14" y="14" width="422" height="252" rx="28" fill="#FFFFFF"/>
    
    <!-- App UI: Real-time Dash -->
    <g transform="translate(14, 14)">
      <rect width="422" height="252" rx="28" fill="url(#mobile-grad)" fill-opacity="0.1"/>
      
      <!-- Split View Header -->
      <rect x="12" y="12" width="100" height="22" rx="11" fill="white" fill-opacity="0.6"/>
      <text x="62" y="27" fill="#64748B" font-family="Inter, sans-serif" font-weight="700" font-size="9" text-anchor="middle">横屏 · 实时渲染</text>
      
      <!-- Message Preview -->
      <rect x="124" y="48" width="280" height="120" rx="16" fill="white" shadow="0 4px 6px rgba(0,0,0,0.02)"/>
      <path d="M140 140 Q180 100 220 130 T300 80 T380 60" stroke="#3B82F6" stroke-width="2" fill="none"/>
      <text x="140" y="70" fill="#1E293B" font-family="Inter, sans-serif" font-weight="600" font-size="11">销量动态趋势 (ECharts)</text>
      
      <!-- Sidebar Items (Horizontal) -->
      <rect x="12" y="48" width="100" height="32" rx="8" fill="#BFFFD9" fill-opacity="0.3"/>
      <path d="M24 64 H44" stroke="#065F46" stroke-width="2" stroke-linecap="round"/>
      <rect x="12" y="88" width="100" height="32" rx="8" fill="white" fill-opacity="0.4"/>
      
      <!-- Bottom Controls -->
      <rect x="124" y="180" width="280" height="36" rx="18" fill="white" stroke="#3B82F6" stroke-width="1"/>
      <text x="144" y="202" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">与 AI 讨论数据见解...</text>
      <circle cx="384" cy="198" r="12" fill="#3B82F6"/>
    </g>
  </g>

  <!-- Feature Text -->
  <g transform="translate(680, 500)">
    <text x="0" y="0" fill="#334155" font-family="Inter, sans-serif" font-weight="700" font-size="22">Native Mobile Integration</text>
    <text x="0" y="30" fill="#64748B" font-family="Inter, sans-serif" font-size="15">Capacitor 6 + React 驱动的原生体验</text>
    <g transform="translate(0, 60)">
      <circle cx="10" cy="10" r="4" fill="#10B981"/>
      <text x="24" y="15" fill="#475569" font-family="Inter, sans-serif" font-size="13">适配 iPhone 刘海屏与 Safe Area</text>
      
      <circle cx="10" cy="40" r="4" fill="#3B82F6"/>
      <text x="24" y="45" fill="#475569" font-family="Inter, sans-serif" font-size="13">SSE 流式响应与离线 SQLite 存储</text>
      
      <circle cx="10" cy="70" r="4" fill="#A855F7"/>
      <text x="24" y="75" fill="#475569" font-family="Inter, sans-serif" font-size="13">业务数据库一键本地同步</text>
    </g>
  </g>

  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06D6A0"/>
    </linearGradient>
    <linearGradient id="mobile-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BFFFD9"/>
      <stop offset="100%" stop-color="#E0FFFF"/>
    </linearGradient>
  </defs>
</svg>
