<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with Blur Overlay -->
  <rect width="1200" height="800" rx="32" fill="#F1F5F9"/>
  <rect x="20" y="20" width="1160" height="760" rx="24" fill="white" fill-opacity="0.8"/>
  <circle cx="600" cy="400" r="400" fill="#E6E6FA" fill-opacity="0.2" filter="blur(120px)"/>

  <!-- Modal Backdrop -->
  <rect width="1200" height="800" fill="black" fill-opacity="0.25"/>

  <!-- Storage Management Modal (StorageModal) -->
  <g transform="translate(360, 160)">
    <!-- Modal Container -->
    <rect width="480" height="480" rx="28" fill="white" shadow="0 25px 50px -12px rgba(0, 0, 0, 0.25)"/>
    <rect width="480" height="480" rx="28" stroke="#E2E8F0" stroke-width="1"/>
    
    <!-- Modal Header -->
    <g transform="translate(24, 24)">
      <circle cx="16" cy="16" r="16" fill="#FAF5FF"/>
      <path d="M10 16 H22 M10 12 H22 M10 20 H18" stroke="#A855F7" stroke-width="2" stroke-linecap="round"/>
      <text x="44" y="21" fill="#1E293B" font-family="Inter, sans-serif" font-weight="700" font-size="18">本地存储管理</text>
      
      <!-- Close Button -->
      <rect x="390" y="0" width="32" height="32" rx="10" fill="#F1F5F9"/>
      <path d="M400 10 L412 22 M412 10 L400 22" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
    </g>
    
    <line x1="0" y1="72" x2="480" y2="72" stroke="#F1F5F9"/>

    <!-- Modal Body -->
    <g transform="translate(32, 100)">
      <!-- Core Data Section -->
      <text x="0" y="0" fill="#94A3B8" font-family="Inter, sans-serif" font-weight="700" font-size="11" letter-spacing="0.05em">核心数据 (CORE DATA)</text>
      
      <g transform="translate(0, 16)">
        <!-- Row 1 -->
        <rect width="416" height="44" rx="14" fill="#F8FAFC"/>
        <text x="16" y="27" fill="#475569" font-family="Inter, sans-serif" font-size="13">💬 对话会话 (Sessions)</text>
        <text x="360" y="27" fill="#1E293B" font-family="SF Mono, monospace" font-weight="600" font-size="13" text-anchor="end">42 条</text>
        
        <!-- Row 2 -->
        <g transform="translate(0, 52)">
          <rect width="416" height="44" rx="14" fill="#F8FAFC"/>
          <text x="16" y="27" fill="#475569" font-family="Inter, sans-serif" font-size="13">✉️ 聊天消息 (Messages)</text>
          <text x="360" y="27" fill="#1E293B" font-family="SF Mono, monospace" font-weight="600" font-size="13" text-anchor="end">1,529 条</text>
        </g>
      </g>

      <!-- Offline Biz Data Section -->
      <g transform="translate(0, 140)">
        <text x="0" y="0" fill="#94A3B8" font-family="Inter, sans-serif" font-weight="700" font-size="11" letter-spacing="0.05em">离线业务数据 (OFFLINE BIZ)</text>
        <text x="416" y="0" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11" text-anchor="end">合计 12,840 行</text>
        
        <g transform="translate(0, 16)">
          <!-- Biz Database Item -->
          <rect width="416" height="68" rx="18" fill="white" stroke="#E2E8F0"/>
          <circle cx="34" cy="34" r="14" fill="#EFF6FF"/>
          <path d="M28 34 H40 M28 30 H40 M28 38 H40" stroke="#3B82F6" stroke-width="2"/>
          
          <text x="60" y="32" fill="#1E293B" font-family="Inter, sans-serif" font-weight="600" font-size="14">mysql_prod_business</text>
          <text x="60" y="50" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">已同步 12,500 行 · 占用 1.2 MB</text>
          
          <!-- Clear Button -->
          <rect x="330" y="20" width="70" height="28" rx="10" fill="white" stroke="#FECACA"/>
          <text x="365" y="38" fill="#EF4444" font-family="Inter, sans-serif" font-weight="600" font-size="11" text-anchor="middle">清除缓存</text>
        </g>
      </g>
    </g>

    <!-- Modal Footer -->
    <g transform="translate(24, 430)">
      <line x1="-24" y1="0" x2="456" y2="0" stroke="#F1F5F9"/>
      <text x="216" y="24" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">清除业务数据不影响对话记录，可随时重新从服务器同步</text>
    </g>
  </g>

  <!-- Explanation Tags -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="180" height="44" rx="14" fill="#BFFFD9" fill-opacity="0.8"/>
    <text x="90" y="27" fill="#065F46" font-family="Inter, sans-serif" font-weight="700" font-size="14" text-anchor="middle">数据管理中心</text>
  </g>
</svg>
