<svg width="1200" height="850" viewBox="0 0 1200 850" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="850" rx="16" fill="#F1F5F9"/>
  
  <!-- Shadow/Border for Main Container -->
  <rect x="10" y="10" width="1180" height="830" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ==================== LEFT SIDEBAR ==================== -->
  <rect x="10" y="10" width="260" height="830" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  
  <!-- Logo Section -->
