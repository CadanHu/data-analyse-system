  <path d="M40 55 L40 45 L50 50 Z" fill="white"/>
  <text x="72" y="58" fill="#1E293B" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="20">DataPulse</text>
  
  <!-- New Chat Button -->
  <rect x="30" y="90" width="220" height="42" rx="8" fill="#3B82F6"/>
  <text x="95" y="117" fill="white" font-family="Inter, sans-serif" font-weight="600" font-size="14">+ 新建分析</text>

  <!-- Navigation -->
  <text x="35" y="165" fill="#94A3B8" font-family="Inter, sans-serif" font-weight="600" font-size="11" letter-spacing="0.05em">历史会话</text>
  <rect x="25" y="180" width="230" height="40" rx="6" fill="#EFF6FF"/>
  <text x="45" y="205" fill="#3B82F6" font-family="Inter, sans-serif" font-weight="500" font-size="13">📊 2024 产品线销售趋势分析</text>
  
  <text x="45" y="245" fill="#475569" font-family="Inter, sans-serif" font-size="13">📑 华东大区业务对账单</text>
  <text x="45" y="285" fill="#475569" font-family="Inter, sans-serif" font-size="13">📁 RAG 知识库: 2025 战略指南</text>

  <!-- Database & Knowledge Base Section -->
  <line x1="30" y1="330" x2="250" y2="330" stroke="#E2E8F0"/>
  <text x="35" y="360" fill="#94A3B8" font-family="Inter, sans-serif" font-weight="600" font-size="11" letter-spacing="0.05em">资源管理</text>
  
  <!-- DB Selector Mock -->
  <rect x="30" y="375" width="220" height="36" rx="6" fill="white" stroke="#CBD5E1"/>
  <text x="45" y="398" fill="#1E293B" font-family="Inter, sans-serif" font-size="12">🗄️ MySQL: classic_business</text>
  
  <rect x="30" y="420" width="220" height="36" rx="6" fill="white" stroke="#CBD5E1"/>
  <text x="45" y="443" fill="#1E293B" font-family="Inter, sans-serif" font-size="12">📚 已挂载: 5 个业务文档</text>

  <!-- ==================== MAIN CHAT AREA ==================== -->
  <!-- Header -->
  <rect x="270" y="10" width="650" height="65" rx="0" fill="white" stroke="#E2E8F0"/>
  <text x="300" y="48" fill="#1E293B" font-family="Inter, sans-serif" font-weight="600" font-size="16">2024 产品线销售趋势分析</text>
  <rect x="780" y="28" width="120" height="28" rx="14" fill="#F0F9FF" stroke="#B9E6FE"/>
  <text x="795" y="46" fill="#0284C7" font-family="Inter, sans-serif" font-weight="500" font-size="11">SQL + RAG 模式</text>

  <!-- Chat Content -->
  <!-- User Message -->
  <rect x="800" y="100" width="100" height="36" rx="18" fill="#3B82F6"/>
  <text x="815" y="123" fill="white" font-family="Inter, sans-serif" font-size="13">分析去年的趋势</text>

  <!-- AI Thinking Box (R1 Reasoning) -->
  <rect x="300" y="160" width="600" height="110" rx="10" fill="#FFFBEB" stroke="#FEF3C7" stroke-width="1.5"/>
  <text x="320" y="190" fill="#B45309" font-family="Inter, sans-serif" font-weight="700" font-size="12">🧠 DEEPSEEK R1 推理链 (Thought Chain)</text>
  <text x="320" y="215" fill="#D97706" font-family="Courier, monospace" font-size="11">1. [Intent] 用户请求 2024 年趋势 -> 关联表: regional_sales_distribution</text>
  <text x="320" y="235" fill="#D97706" font-family="Courier, monospace" font-size="11">2. [RAG] 检索知识库文档 "sales_report_2024.pdf" 获取业务背景</text>
  <text x="320" y="255" fill="#D97706" font-family="Courier, monospace" font-size="11">3. [SQL] 生成 SQL: SELECT month, SUM(amount) FROM ... GROUP BY ...</text>

  <!-- AI Final Response -->
  <text x="300" y="310" fill="#1E293B" font-family="Inter, sans-serif" font-size="14" font-weight="500">根据数据库查询及 RAG 增强分析，2024 年销售趋势如下：</text>
  
  <!-- Data Results Table Mock -->
  <rect x="300" y="330" width="600" height="200" rx="8" fill="white" stroke="#E2E8F0"/>
  <rect x="300" y="330" width="600" height="35" rx="8" fill="#F8FAFC"/>
  <text x="320" y="353" fill="#64748B" font-family="Inter, sans-serif" font-weight="600" font-size="12">月份</text>
  <text x="420" y="353" fill="#64748B" font-family="Inter, sans-serif" font-weight="600" font-size="12">智能终端 (¥)</text>
  <text x="560" y="353" fill="#64748B" font-family="Inter, sans-serif" font-weight="600" font-size="12">增长率 (%)</text>
  
  <line x1="300" y1="365" x2="900" y2="365" stroke="#F1F5F9"/>
  <text x="320" y="388" fill="#1E293B" font-family="Inter, sans-serif" font-size="12">2024-06</text>
  <text x="420" y="388" fill="#1E293B" font-family="Inter, sans-serif" font-size="12">1,245,600.00</text>
  <text x="560" y="388" fill="#10B981" font-family="Inter, sans-serif" font-weight="600" font-size="12">+15.2%</text>

  <rect x="320" y="470" width="120" height="32" rx="6" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="335" y="491" fill="#475569" font-family="Inter, sans-serif" font-weight="600" font-size="12">📋 复制 SQL</text>
  
  <rect x="450" y="470" width="120" height="32" rx="6" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="465" y="491" fill="#475569" font-family="Inter, sans-serif" font-weight="600" font-size="12">📥 下载 PDF</text>

  <!-- Input Bar -->
  <rect x="300" y="750" width="600" height="56" rx="28" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="330" cy="778" r="16" fill="#F1F5F9"/>
  <text x="323" y="784" fill="#3B82F6" font-size="18">+</text>
  <text x="360" y="778" fill="#94A3B8" font-family="Inter, sans-serif" font-size="14">输入分析指令，支持上传文档 RAG 增强...</text>
  <rect x="840" y="758" width="50" height="40" rx="20" fill="#3B82F6"/>
  <path d="M860 770 L870 778 L860 786" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- ==================== RIGHT PANEL (Visualization) ==================== -->
  <rect x="930" y="10" width="260" height="830" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="955" y="48" fill="#1E293B" font-family="Inter, sans-serif" font-weight="700" font-size="16">智能可视化</text>
  
  <!-- Metric Cards -->
  <rect x="950" y="80" width="220" height="80" rx="10" fill="white" stroke="#E2E8F0"/>
  <text x="965" y="105" fill="#64748B" font-family="Inter, sans-serif" font-size="11">年度总销售额</text>
  <text x="965" y="140" fill="#1E293B" font-family="Inter, sans-serif" font-weight="700" font-size="22">¥14.58M</text>
  
  <!-- Area Chart Mock -->
  <rect x="950" y="180" width="220" height="240" rx="10" fill="white" stroke="#E2E8F0"/>
  <text x="965" y="205" fill="#64748B" font-family="Inter, sans-serif" font-weight="600" font-size="12">趋势趋势 (ECharts)</text>
  <path d="M965 380 Q1000 320 1030 350 T1100 280 T1150 240" stroke="#3B82F6" stroke-width="3" fill="none"/>
  <path d="M965 380 Q1000 320 1030 350 T1100 280 T1150 240 V380 H965 Z" fill="#3B82F6" fill-opacity="0.1"/>
  <line x1="965" y1="385" x2="1155" y2="385" stroke="#CBD5E1"/>
  <line x1="965" y1="385" x2="965" y2="240" stroke="#CBD5E1"/>

  <!-- SQL Code Snippet -->
  <text x="955" y="460" fill="#64748B" font-family="Inter, sans-serif" font-weight="600" font-size="12">自动生成的 SQL</text>
  <rect x="950" y="475" width="220" height="150" rx="8" fill="#0F172A"/>
  <text x="962" y="500" fill="#94A3B8" font-family="Courier, monospace" font-size="10">SELECT</text>
  <text x="962" y="515" fill="#F8FAFC" font-family="Courier, monospace" font-size="10">  date, revenue</text>
  <text x="962" y="530" fill="#94A3B8" font-family="Courier, monospace" font-size="10">FROM</text>
  <text x="962" y="545" fill="#F8FAFC" font-family="Courier, monospace" font-size="10">  daily_metrics</text>
  <text x="962" y="560" fill="#94A3B8" font-family="Courier, monospace" font-size="10">WHERE</text>
  <text x="962" y="575" fill="#F8FAFC" font-family="Courier, monospace" font-size="10">  date LIKE '2024%'</text>

  <!-- Mobile Sync Status -->
  <rect x="950" y="770" width="220" height="40" rx="20" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="975" y="795" fill="#15803D" font-family="Inter, sans-serif" font-weight="600" font-size="12">✅ 移动端已同步 (iOS/Android)</text>
