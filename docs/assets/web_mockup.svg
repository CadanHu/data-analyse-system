<svg width="1200" height="850" viewBox="0 0 1200 850" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dynamic Background with Gradients -->
  <rect width="1200" height="850" rx="24" fill="#FAFAFA"/>
  <circle cx="200" cy="150" r="400" fill="#BFFFD9" fill-opacity="0.25" filter="blur(100px)"/>
  <circle cx="1000" cy="700" r="400" fill="#E0FFFF" fill-opacity="0.2" filter="blur(100px)"/>
  <circle cx="600" cy="425" r="300" fill="#E6E6FA" fill-opacity="0.15" filter="blur(100px)"/>

  <!-- Main Container (Glassmorphism) -->
  <rect x="20" y="20" width="1160" height="810" rx="32" fill="white" fill-opacity="0.6"/>
  <rect x="20" y="20" width="1160" height="810" rx="32" stroke="white" stroke-opacity="0.6" stroke-width="1.5"/>
  
  <!-- Left Sidebar (SessionList) -->
  <g transform="translate(20, 20)">
    <rect width="280" height="810" rx="32" fill="white" fill-opacity="0.4"/>
    <rect width="280" height="810" rx="32" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="24" y="32" width="40" height="40" rx="12" fill="url(#brand-grad)"/>
    <path d="M36 58 L36 46 L48 52 Z" fill="white"/>
    <text x="76" y="60" fill="#334155" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22">DataPulse</text>
    
    <!-- New Chat Button -->
    <rect x="24" y="96" width="232" height="48" rx="16" fill="url(#brand-grad)"/>
    <text x="140" y="126" fill="white" font-family="Inter, sans-serif" font-weight="600" font-size="15" text-anchor="middle">+ 新建分析任务</text>
    
    <!-- Search Bar -->
    <rect x="24" y="156" width="232" height="40" rx="12" fill="white" fill-opacity="0.6" stroke="#E2E8F0"/>
    <text x="40" y="181" fill="#94A3B8" font-family="Inter, sans-serif" font-size="13">搜索历史会话...</text>
    
    <!-- Session List Items -->
    <g transform="translate(12, 216)">
      <rect width="256" height="64" rx="16" fill="#BFFFD9" fill-opacity="0.25" stroke="#BFFFD9" stroke-opacity="0.4"/>
      <text x="16" y="28" fill="#1E293B" font-family="Inter, sans-serif" font-weight="600" font-size="14">📊 2025 季度销售预测模型</text>
      <text x="16" y="48" fill="#64748B" font-family="Inter, sans-serif" font-size="11">刚刚 · AI Scientist Mode</text>
      
      <g transform="translate(0, 76)">
        <rect width="256" height="64" rx="16" fill="transparent" stroke="transparent"/>
        <text x="16" y="28" fill="#475569" font-family="Inter, sans-serif" font-size="14">📈 深南大道交通流量分析</text>
        <text x="16" y="48" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">2 小时前 · SQL Mode</text>
      </g>
      
      <g transform="translate(0, 140)">
        <text x="16" y="28" fill="#475569" font-family="Inter, sans-serif" font-size="14">📚 RAG: 技术白皮书解读</text>
        <text x="16" y="48" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">昨天 · Deep Mode</text>
      </g>
    </g>

    <!-- Bottom Actions -->
    <rect x="0" y="730" width="280" height="80" rx="32" fill="white" fill-opacity="0.2"/>
    <line x1="20" y1="730" x2="260" y2="730" stroke="#E2E8F0" stroke-opacity="0.5"/>
    
    <!-- User Avatar Info -->
    <circle cx="50" cy="770" r="18" fill="url(#user-grad)"/>
    <text x="50" y="775" fill="white" font-family="Inter, sans-serif" font-weight="700" font-size="14" text-anchor="middle">H</text>
    <text x="78" y="768" fill="#334155" font-family="Inter, sans-serif" font-weight="600" font-size="13">Huyitao</text>
    <text x="78" y="782" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">Premium Plan</text>
    
    <!-- Mini Icons -->
    <rect x="180" y="758" width="24" height="24" rx="6" fill="#EFF6FF"/>
    <path d="M185 770 H199 M185 766 H199 M185 774 H195" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    
    <rect x="212" y="758" width="24" height="24" rx="6" fill="#F0FDF4"/>
    <circle cx="224" cy="770" r="5" stroke="#10B981" stroke-width="1.5"/>
    
    <rect x="244" y="758" width="24" height="24" rx="6" fill="#FAF5FF"/>
    <circle cx="256" cy="770" r="6" stroke="#A855F7" stroke-width="1.5"/>
  </g>

  <!-- Middle Chat Area (ChatArea) -->
  <g transform="translate(300, 20)">
    <rect width="600" height="810" fill="transparent"/>
    
    <!-- Header -->
    <text x="32" y="58" fill="#1E293B" font-family="Inter, sans-serif" font-weight="700" font-size="18">2025 季度销售预测模型</text>
    <rect x="480" y="38" width="100" height="28" rx="14" fill="#BFFFD9" fill-opacity="0.3" stroke="#BFFFD9" stroke-opacity="0.6"/>
    <text x="530" y="56" fill="#065F46" font-family="Inter, sans-serif" font-weight="600" font-size="11" text-anchor="middle">Scientist Mode</text>
    <line x1="0" y1="88" x2="600" y2="88" stroke="#F1F5F9"/>

    <!-- Messages -->
    <!-- User -->
    <rect x="420" y="120" width="160" height="44" rx="20" fill="#3B82F6"/>
    <text x="560" y="147" fill="white" font-family="Inter, sans-serif" font-size="13" text-anchor="end">基于去年数据预测 Q3 趋势</text>
    
    <!-- Assistant Thinking -->
    <rect x="32" y="184" width="540" height="120" rx="20" fill="#FFFBEB" stroke="#FEF3C7" stroke-width="1"/>
    <text x="52" y="214" fill="#B45309" font-family="Inter, sans-serif" font-weight="700" font-size="12">🧠 AI 推理过程 (DeepSeek R1)</text>
    <text x="52" y="238" fill="#D97706" font-family="SF Mono, monospace" font-size="11">> 正在调用 Python Sandbox 执行 Pandas 分析...</text>
    <text x="52" y="258" fill="#D97706" font-family="SF Mono, monospace" font-size="11">> 数据集探测: sales_records_v2 表 (8.5w 行)</text>
    <text x="52" y="278" fill="#D97706" font-family="SF Mono, monospace" font-size="11">> 推荐模型: ARIMA 时间序列建模</text>

    <!-- Assistant Response -->
    <rect x="32" y="324" width="540" height="380" rx="24" fill="white" stroke="#E2E8F0"/>
    <text x="52" y="358" fill="#1E293B" font-family="Inter, sans-serif" font-size="14" font-weight="600">分析完成。以下是 2025 Q3 的销量预测简报：</text>
    
    <!-- Code/Table Mock -->
    <rect x="52" y="380" width="500" height="180" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="52" y="380" width="500" height="34" rx="12" fill="#F1F5F9"/>
    <text x="70" y="402" fill="#64748B" font-family="Inter, sans-serif" font-weight="600" font-size="11">预测指标</text>
    <text x="200" y="402" fill="#64748B" font-family="Inter, sans-serif" font-weight="600" font-size="11">期望值</text>
    <text x="350" y="402" fill="#64748B" font-family="Inter, sans-serif" font-weight="600" font-size="11">置信区间</text>
    
    <text x="70" y="435" fill="#334155" font-family="Inter, sans-serif" font-size="12">终端销量 (Units)</text>
    <text x="200" y="435" fill="#3B82F6" font-family="Inter, sans-serif" font-weight="700" font-size="12">156,700</text>
    <text x="350" y="435" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">±4.2%</text>

    <!-- Python Visualization Preview -->
    <rect x="52" y="580" width="140" height="36" rx="10" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.2"/>
    <text x="122" y="603" fill="#3B82F6" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">查看 Python 源码</text>
    
    <!-- Input Bar -->
    <rect x="32" y="740" width="540" height="56" rx="28" fill="white" stroke="url(#brand-grad)" stroke-width="2" shadow="0 4px 12px rgba(0,0,0,0.05)"/>
    <circle cx="62" cy="768" r="18" fill="#F1F5F9"/>
    <path d="M62 760 V776 M54 768 H70" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <text x="96" y="768" fill="#94A3B8" font-family="Inter, sans-serif" font-size="14">输入分析需求，例如 "预测下月库存"...</text>
    <rect x="520" y="748" width="40" height="40" rx="20" fill="url(#brand-grad)"/>
    <path d="M535 768 L545 768 M540 763 L545 768 L540 773" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right Panel (RightPanel) -->
  <g transform="translate(900, 20)">
    <rect width="280" height="810" rx="32" fill="white" fill-opacity="0.4"/>
    <rect width="280" height="810" rx="32" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    
    <text x="24" y="58" fill="#1E293B" font-family="Inter, sans-serif" font-weight="700" font-size="16">智能可视化面板</text>
    
    <!-- Chart Preview -->
    <rect x="18" y="96" width="244" height="260" rx="20" fill="white" stroke="#E2E8F0"/>
    <text x="34" y="126" fill="#64748B" font-family="Inter, sans-serif" font-weight="600" font-size="12">销量预测分布 (Matplotlib)</text>
    
    <!-- Wave Chart Mock -->
    <path d="M34 280 L60 220 L90 250 L120 180 L150 200 L180 140 L210 160 L240 100" stroke="#10B981" stroke-width="3" fill="none"/>
    <path d="M34 280 L60 220 L90 250 L120 180 L150 200 L180 140 L210 160 L240 100 V300 H34 Z" fill="#10B981" fill-opacity="0.1"/>
    
    <!-- KPI Cards -->
    <rect x="18" y="376" width="244" height="80" rx="20" fill="url(#brand-light-grad)" stroke="#BFFFD9" stroke-opacity="0.5"/>
    <text x="34" y="406" fill="#065F46" font-family="Inter, sans-serif" font-weight="600" font-size="11">预计年度毛利</text>
    <text x="34" y="440" fill="#065F46" font-family="Inter, sans-serif" font-weight="800" font-size="24">¥3.24M</text>
    
    <!-- SQL Preview -->
    <rect x="18" y="476" width="244" height="220" rx="20" fill="#1E293B"/>
    <text x="34" y="506" fill="#94A3B8" font-family="Inter, sans-serif" font-weight="600" font-size="11">执行的 SQL 代码</text>
    <text x="34" y="534" fill="#E2E8F0" font-family="SF Mono, monospace" font-size="10">SELECT</text>
    <text x="34" y="549" fill="#F8FAFC" font-family="SF Mono, monospace" font-size="10">  date, SUM(qty) AS total</text>
    <text x="34" y="564" fill="#E2E8F0" font-family="SF Mono, monospace" font-size="10">FROM</text>
    <text x="34" y="579" fill="#F8FAFC" font-family="SF Mono, monospace" font-size="10">  fact_sales</text>
    <text x="34" y="594" fill="#E2E8F0" font-family="SF Mono, monospace" font-size="10">WHERE</text>
    <text x="34" y="609" fill="#F8FAFC" font-family="SF Mono, monospace" font-size="10">  year = 2024</text>
    <text x="34" y="624" fill="#E2E8F0" font-family="SF Mono, monospace" font-size="10">GROUP BY</text>
    <text x="34" y="639" fill="#F8FAFC" font-family="SF Mono, monospace" font-size="10">  1</text>
    
    <!-- Sync Badge -->
    <rect x="18" y="746" width="244" height="44" rx="22" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="140" y="774" fill="#166534" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">✅ 移动端同步就绪 (iOS/Android)</text>
  </g>

  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06D6A0"/>
    </linearGradient>
    <linearGradient id="user-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>
    <linearGradient id="brand-light-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BFFFD9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E0FFFF" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
</svg>
